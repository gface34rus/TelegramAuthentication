<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/path/to/local/tailwind.css" rel="stylesheet">
    <title>Личный кабинет</title>
</head>
<body class="bg-gray-100">
<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold" th:text="'Привет, ' + ${user.firstName} + '!'">Привет, Пользователь!</h1>
    <p>Ваши данные:</p>
    <ul>
        <li>ID: <span th:text="${user.id}">1</span></li>
        <li>Имя: <span th:text="${user.firstName}">Имя</span></li>
        <li>Фамилия: <span th:text="${user.lastName}">Фамилия</span></li>
        <li>Имя пользователя: <span th:text="${user.username}">ИмяПользователя</span></li>
    </ul>
</div>
</body>
</html>
